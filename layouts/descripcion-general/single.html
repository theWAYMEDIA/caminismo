{{ define "main" }}
<article>
    {{ if not (strings.HasPrefix (strings.TrimSpace .Content) "<h1") }}<h1>{{ .Title }}</h1>{{ end }}
    {{ .Content }}

    {{ if .Params.related }}
    <div class="related">
        <h3>Conceptos Relacionados:</h3>
        <ul>
        {{ range .Params.related }}
            <li><a href="/glosario/#{{ . | urlize }}">{{ . }}</a></li>
        {{ end }}
        </ul>
    </div>
    {{ end }}

    {{ partial "smart-book-nav.html" . }}
</article>
{{ end }}
